name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule : 
    - cron : '30 3 * * *'
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install chromium --with-deps
    - name: Run Playwright tests
      # Virtual Screen (Xvfb): Linux runners par headed browser direct nahi chal sakta, isliye humne xvfb-run utility setup ki hai jo Linux memory me ek virtual display buffer (fake screen) banakar headed execution ko enable kar deti hai.
      run: xvfb-run npx playwright test
      env:
        ENV: dev
        HEADLESS: 'false'

    # 1. Zip HTML report folder
    - name: Zip HTML Report
      if: always()
      run: zip -r reports/html-report.zip reports/html

    # 2. Run email script and pass GitHub Secrets
    - name: Send Email Report
      if: always()
      run: node utils/SendEmail.js
      env:
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASS: ${{ secrets.SMTP_PASS }}
        EMAIL_TO: ${{ secrets.EMAIL_TO }}

    # 3. Upload HTML report as GitHub Action artifact
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: reports/html/
        retention-days: 30

